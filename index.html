<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGENT QUEST</title>
    <link rel="stylesheet" href="/src/ui/gameboy/styles.css" />
  </head>
  <body>
    <main id="app">
      <!-- The Game Boy (DMG-01), drawn entirely in CSS. The plastic shell +
           bezel + branding + controls live in .gb-chrome; the lit green LCD
           (#screen) is a SIBLING so it can lift above the chrome during zoom.
           The Pixi canvas mounts inside #screen. -->
      <div id="device">
        <!-- Everything that is NOT the lit LCD. Fades + recedes on zoom. -->
        <div class="gb-chrome" aria-hidden="true">
          <!-- Top-edge power switch hint. -->
          <div class="gb-power">
            <span class="gb-power-slot"></span>
            <span class="gb-power-text">&#9664;&#9472; OFF &#183; ON &#9472;&#9658;</span>
          </div>

          <!-- Recessed charcoal screen bezel (chamfered bottom-left). -->
          <div class="gb-bezel">
            <!-- Power LED + BATTERY label, left of the LCD. -->
            <div class="gb-battery">
              <span class="gb-battery-text">BATTERY</span>
              <span class="gb-led"></span>
            </div>
            <!-- Caption across the top of the bezel, flanked by engraved dashes. -->
            <div class="gb-dotmatrix">DOT MATRIX WITH STEREO SOUND</div>
          </div>

          <!-- Wordmark on the grey body: the authentic "Nintendo GAME BOY"
               lockup as an inline vector (recolored to the DMG navy via CSS).
               Source: Wikimedia Commons "Nintendo Game Boy Logo.svg". -->
          <div class="gb-brand">
            <span class="gb-brand-nintendo">Nintendo</span>
            <svg class="gb-logo" viewBox="0.9 -0.2 1126.5 197.4" role="img" aria-label="GAME BOY" fill="currentColor">
              <path d="M215.7,100.6L232.1,64l7.2,36.6H215.7 M447.8,4.9l-44.5,103.5L383.6,4.9h-38.3l-54.5,152.5L265.3,4.9h-47.8l-72.4,164.4l10.8-68.7H84l-5.7,35.4h30.2l-3.5,18.9c-17.2,7.1-46.4,4.4-58.9-18c-7.9-14.2-15.3-45.8,18-74.9c27.2-23.7,74.2-28,101.3-15.6c0,0,3.4-19.9,6-38.3c-52.1-18-92.6-3-119.7,13.8C14.6,44.6-3.2,79.5,1.7,126.9c5.5,54.9,76.6,89.6,136.9,54.6c0.7-0.3,1-0.6,1.6-0.7l-5.8,12.8h40.5l25.5-56.5h44.8l9.8,56.5h66l33.6-105.5l27.6,105.5H408l44.3-116.8l17.5,117.5h38.7L494.4,4.9H447.8z"/>
              <polyline points="508.5,194.4 616.6,194.4 623.1,154 555.5,154 560.8,120.3 619.7,120.3 626.1,79.8 566.7,79.8 571.8,46.3 639.5,46.3 645.9,5.8 538.6,5.8 508.5,194.4 "/>
              <polyline points="1043.8,65.1 1019.6,3.6 975.2,3.6 1021,103.1 1006.8,192.2 1045.7,192.2 1057.5,113.4 1127.4,3.6 1082,3.6 1043.8,65.1 "/>
              <path d="M952.4,117.5c-10.4,31.2-35.6,49.4-56.1,40.1c-20.4-9.1-28.7-42-18.2-73.4c10.5-31.5,35.6-49.3,56-40.2C954.6,53.2,962.9,86.1,952.4,117.5 M937.3,6.6c-43-9.9-87.7,24.3-99.8,76.4c-11.9,52.2,13.1,102.5,56,112.5c43,9.8,87.6-24.4,99.8-76.5C1005.2,66.8,980.1,16.5,937.3,6.6z"/>
              <path d="M761.3,82c-21.3,0-26.8,0-26.8,0l5.9-35c0,0,0.8,0,25.2,0C793,47,787.4,82,761.3,82 M756.6,158.2c-21.4,0-34.2,0-34.2,0l6-37.6c0,0,8.1,0,32.4,0C791.7,120.6,790.8,158.2,756.6,158.2z M779.3,7.1c-20.9-0.3-72.6,0-72.6,0h0.4l-30,187.3c0,0,62.1,0,87.3,0c36,0,88.5-52.9,40.6-96.1C854,47.4,805.4,7.7,779.3,7.1z"/>
            </svg>
            <span class="gb-brand-tm">TM</span>
          </div>

          <!-- D-pad, lower-left. Four transparent hit zones over the cross arms
               make each direction independently clickable (see input.ts). -->
          <div class="gb-dpad">
            <span class="gb-dpad-h"></span>
            <span class="gb-dpad-v"></span>
            <span class="gb-dpad-dish"></span>
            <span class="gb-dpad-zone gb-dpad-zone--up" data-dir="up" aria-label="Up"></span>
            <span class="gb-dpad-zone gb-dpad-zone--down" data-dir="down" aria-label="Down"></span>
            <span class="gb-dpad-zone gb-dpad-zone--left" data-dir="left" aria-label="Left"></span>
            <span class="gb-dpad-zone gb-dpad-zone--right" data-dir="right" aria-label="Right"></span>
          </div>

          <!-- A / B buttons, lower-right, on a -25deg diagonal. -->
          <div class="gb-ab">
            <span class="gb-btn gb-btn--b"></span>
            <span class="gb-btn gb-btn--a"></span>
            <span class="gb-ab-label gb-ab-label--b">B</span>
            <span class="gb-ab-label gb-ab-label--a">A</span>
          </div>

          <!-- START / SELECT pills, center-lower. -->
          <div class="gb-startsel">
            <span class="gb-pill gb-pill--select"></span>
            <span class="gb-pill gb-pill--start"></span>
            <span class="gb-pill-label gb-pill-label--select">SELECT</span>
            <span class="gb-pill-label gb-pill-label--start">START</span>
          </div>

          <!-- Speaker grille, lower-right corner. -->
          <div class="gb-speaker"></div>
        </div>

        <!-- The green LCD. Click target for zoom. The Pixi canvas mounts here. -->
        <div
          id="screen"
          tabindex="0"
          role="button"
          aria-label="Zoom into the screen"
        >
          <!-- Power-off overlay: SHUT DOWN fades the LCD to black; any button
               press powers it back on (handled in main.ts). -->
          <div id="screen-power" class="screen-power" aria-hidden="true">
            <span>&#9654; PRESS ANY KEY</span>
          </div>
          <!-- Close (X) button, only visible while zoomed. -->
          <button
            id="screen-close"
            type="button"
            class="screen-close"
            aria-label="Exit zoom"
            title="Exit zoom (Esc)"
          >
            &times;<span class="screen-close-esc">Esc</span>
          </button>
        </div>
      </div>

      <!-- CRT-style MIND LOG terminal (populated by a later step). -->
      <aside id="mindlog">
        <div class="mindlog-header">MIND LOG</div>
        <div class="mindlog-body"></div>
      </aside>

      <!-- Dim backdrop behind the lifted LCD while zoomed. Lives INSIDE #app so
           it shares the LCD's stacking context — #app is position:fixed (its own
           stacking context), so a root-level backdrop would paint OVER the whole
           console and dim the screen. Here: backdrop(50) < mindlog(55) < device(60).
           Click it to exit. -->
      <div id="zoom-backdrop" class="zoom-backdrop" aria-hidden="true"></div>
    </main>

    <!-- Quest input — a Game-Boy-style text box shown ON the LCD while zoomed.
         zoom.ts positions it over the bottom of the enlarged screen and focuses
         it on entry. Keeps the #prompt-input / #prompt-go ids main.ts wires to. -->
    <div id="screen-prompt" class="screen-prompt">
      <span class="screen-prompt-label">QUEST</span>
      <input
        id="prompt-input"
        type="text"
        placeholder="type the hero's quest, then press &#9654;…"
        autocomplete="off"
      />
      <button id="prompt-go" type="button" aria-label="Start quest">&#9654;</button>
    </div>

    <script type="module" src="/src/ui/gameboy/main.ts"></script>
  </body>
</html>
